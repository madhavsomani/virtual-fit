name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Tests (gate — Phase 7.45)
        # All tests/*.test.mjs guards (no fake metric, no perma-zero, no
        # silent server failure, no dead SWA fn, no dead ThreeOverlay,
        # /generate-3d uses TRELLIS, no dead api-server, etc.) must pass
        # before we burn a Next build or deploy to Azure.
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Scan build output for leaked secrets (Phase 7.84)
        # Postbuild secret scanner. Greps out/ for hf_/sk_/AKIA/ghp_/
        # Stripe-secret patterns. Catches NEXT_PUBLIC_* env vars
        # accidentally inlined into client-side JS chunks BEFORE the
        # SWA deploy ships them publicly. Phase 7.83 originally added
        # this to the wrong workflow file (an untracked duplicate at
        # virtual-tryon-v2/.github/) which is why CI never ran it; 7.84
        # moves it into the real active workflow at app/.github/.
        run: pnpm run scan:secrets

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "out"
          api_location: "api"
          output_location: ""
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
