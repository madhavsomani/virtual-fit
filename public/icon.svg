<?xml version="1.0" encoding="UTF-8"?>
<!--
  Phase 7.48: PWA app icon (512x512 source). Maskable-safe: critical
  content is kept within the central 80% radius per W3C spec so neither
  iOS nor Android crops the brand mark when applying their platform
  shape masks.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background (maskable: edges may be cropped by platform). -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Safe area: 80% central circle. Brand mark fits inside. -->
  <g transform="translate(256,256)" fill="#fff" stroke="none" font-family="Inter, system-ui, sans-serif" font-weight="900">
    <!-- Stylized 'VF' monogram, contained in ~205px square (80% safe area = 410px diameter circle). -->
    <text x="0" y="34" text-anchor="middle" font-size="220" letter-spacing="-12">VF</text>
  </g>
</svg>
