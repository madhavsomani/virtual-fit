<!DOCTYPE html>
<!--
  Phase 7.30 — static redirect, replacing the React `app/mirror-3d/page.tsx`
  client component (56 lines + ~100 KB First Load JS) that did the same job
  via `useEffect` + `router.replace()` after Suspense + hydration.

  /mirror-3d was the historical "preview only" 3D viewer described in
  docs/3D_BUG_REPORT_2026-04-20.md as having no body tracking. The
  full Iron-Man-suit experience lives at /mirror. Old bookmarks still
  resolve here and instantly forward to /mirror with the garment query
  preserved (?model=… is renamed to ?garment=… for compatibility).

  No React, no Suspense flash, no JS bundle, works with JS disabled.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting to virtual mirror…</title>
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=/mirror" />
    <link rel="canonical" href="/mirror" />
    <style>
      html,body{margin:0;padding:0;background:#0c0c0e;color:#e4e4e7;
        font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
        min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
      .ico{font-size:32px;margin-bottom:12px}
      .sub{font-size:12px;color:#71717a;margin-top:8px}
      a{color:#e4e4e7}
    </style>
  </head>
  <body>
    <main>
      <div class="ico">🔄</div>
      <p>Redirecting to virtual mirror…</p>
      <p class="sub">3D try-on now lives at <a href="/mirror"><code>/mirror</code></a> with full body tracking</p>
    </main>
    <script>
      // Preserve compatibility with old links that used `?model=…` — the
      // new route uses `?garment=…`. Also faster than waiting for the
      // 0-second meta refresh on browsers that honor JS first.
      (function () {
        try {
          var p = new URLSearchParams(window.location.search);
          var m = p.get("model") || p.get("garment");
          var dest = m
            ? "/mirror?garment=" + encodeURIComponent(m)
            : "/mirror";
          window.location.replace(dest);
        } catch (_) {
          window.location.replace("/mirror");
        }
      })();
    </script>
  </body>
</html>
